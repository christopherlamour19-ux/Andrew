<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Link - ScoobyDoo Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden; /* Empêche le scroll */
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* Arrière-plan Vidéo */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.6); /* Assombrit un peu pour lire le texte */
        }

        /* Overlay Flou (Optionnel, pour un look plus doux) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 0;
        }

        /* La Carte Glassmorphism */
        .glass-card {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 450px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1); /* Transparence blanche */
            backdrop-filter: blur(15px); /* L'effet de flou crucial */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Avatar */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: lowercase;
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 25px;
        }

        /* Réseaux Sociaux */
        .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .socials a {
            color: white;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
            text-decoration: none;
        }

        .socials a:hover {
            transform: scale(1.2);
            color: #ddd;
        }

        /* Bouton d'entrée (Nécessaire pour le son) */
        #enter-btn {
            background: white;
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        #enter-btn:hover {
            background: #ccc;
        }

        /* Masquer le contenu au début pour forcer le clic */
        #main-content {
            display: none;
        }

        #landing-screen {
            position: absolute;
            z-index: 10;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="bg.mp4" type="video/mp4">
    </video>

    <div id="landing-screen">
        <button id="enter-btn" onclick="startSite()">CLIQUEZ POUR ENTRER</button>
    </div>

    <div class="glass-card" id="main-content">
        <img src="https://via.placeholder.com/150" alt="Avatar" class="avatar">
        <h1>itsjustscoobydoo</h1>
        <p class="subtitle">UEFN Creator and Streamer</p>
        
        <p><i class="fas fa-map-marker-alt"></i> Deutsachland</p>

        <div class="socials">
            <a href="#"><i class="fab fa-twitch"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-discord"></i></a>
        </div>
    </div>

    <script>
        function startSite() {
            const video = document.getElementById('bg-video');
            const landing = document.getElementById('landing-screen');
            const content = document.getElementById('main-content');

            // 1. On affiche le contenu
            content.style.display = 'block';
            // 2. On cache le bouton d'entrée
            landing.style.display = 'none';
            // 3. On réactive le son de la vidéo et on la redémarre
            video.muted = false;
            video.play();
        }
    </script>
</body>
</html>
